name: Scrape Prices

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Repo clone
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Paketləri quraşdır
        run: pip install -r requirements.txt

      - name: Scraper işlət
        run: python scrapers/scraper.py

      - name: Git push
        run: |
          git config user.name "price-bot"
          git config user.email "bot@price.az"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "update prices"
          git push
