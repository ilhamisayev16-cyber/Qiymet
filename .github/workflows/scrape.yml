name: Scrape Prices Daily

on:
  schedule:
    # Hər gün saat 08:00-da işə düşür
    - cron: '0 8 * * *'
  workflow_dispatch: # Əl ilə işə salmaq üçün düymə

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Əgər əlavə kitabxanalar lazımdırsa (requests və s.)
          # pip install -r requirements.txt

      - name: Run Scraper
        run: python scrapers/scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Avtomatik yenilənmiş qiymətlər" && git push)
