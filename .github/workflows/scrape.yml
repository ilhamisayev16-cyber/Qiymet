name: Scrape Prices Daily

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Repozitoriyanı yükləmək
      uses: actions/checkout@v4

    - name: Python qurmaq
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kitabxanaları yükləmək (Xətanın həlli)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Skripti işə salmaq
      run: python scrapers/scraper.py

    - name: Nəticəni yadda saxlamaq (prices.json)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/prices.json
        git commit -m "Qiymətlər yeniləndi" || echo "Dəyişiklik yoxdur"
        git push
