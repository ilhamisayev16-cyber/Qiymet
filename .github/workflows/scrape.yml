name: Scrape Prices Daily

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Hər gün avtomatik işə düşməsi üçün
  workflow_dispatch:      # Manual işə salmaq üçün (Run workflow düyməsi)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repozitoriyanı yükləmək
      uses: actions/checkout@v4

    - name: Python-u sazlamaq
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Tələb olunan kitabxanaları quraşdırmaq
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Skripti işə salmaq
      run: python scrapers/scraper.py

    - name: Dəyişiklikləri saxlamaq və yaddaşa vermək
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/prices.json
        git diff --staged --quiet || (git commit -m "Avtomatik yenilənmiş qiymətlər" && git push)
