name: Scrape Prices Daily

on:
  schedule:
    - cron: '0 8 * * *' # Hər gün saat 08:00-da işə düşür
  workflow_dispatch: # Əl ilə işə salmaq üçün

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # İcazələrin verilməsi
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Scraper
        run: python scrapers/scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          
          if git diff --staged --quiet; then
            echo "Heç bir dəyişiklik yoxdur, proses dayandırılır."
          else
            git commit -m "Avtomatik yenilənmiş qiymətlər"
            git push origin HEAD:${{ github.ref_name }}
          fi
