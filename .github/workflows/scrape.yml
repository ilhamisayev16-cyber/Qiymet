name: Scrape Prices Daily

on:
  schedule:
    - cron: '0 2 * * *' # Hər gün gecə saat 2-də işləyir
  workflow_dispatch: # Əl ilə işə salmaq üçün

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asılılıqları yüklə
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Scraper işlət
        run: python scrapers/scraper.py

      - name: Nəticəni GitHub-a yüklə
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@budcem.az"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Qiymətlər yeniləndi"
          git push
