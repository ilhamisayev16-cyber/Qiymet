<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qiymət Müqayisə</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
h1{margin-bottom:10px}
input{padding:10px;width:100%;margin-bottom:20px}
table{width:100%;border-collapse:collapse;background:white}
td,th{padding:10px;border:1px solid #ddd;text-align:center}
th{background:#222;color:white}
.best{background:#d4edda}
</style>
</head>

<body>

<h1>🛒 Qiymət Müqayisə</h1>
<p id="date"></p>

<input id="search" placeholder="Axtar..." oninput="render()">

<div id="table"></div>

<script>
let DATA=null;

fetch("data/prices.json")
.then(r=>r.json())
.then(d=>{
  DATA=d;
  document.getElementById("date").innerText="Son yenilənmə: "+d.last_updated;
  render();
});

function groupProducts(){
  let all=[];

  for(let store in DATA.stores){
    DATA.stores[store].forEach(p=>{
      all.push({...p,store});
    });
  }

  let groups=[];

  all.forEach(item=>{
    let found = groups.find(g => g.norm === item.norm);

    if(!found){
      found = {name:item.name,norm:item.norm,prices:{}};
      groups.push(found);
    }

    found.prices[item.store]=item.price;
  });

  return groups;
}

function render(){
  if(!DATA) return;

  const q=document.getElementById("search").value.toLowerCase();

  let groups = groupProducts();

  if(q){
    groups = groups.filter(g => g.name.toLowerCase().includes(q));
  }

  let html="<table><tr><th>Məhsul</th><th>Bravo</th><th>Neptun</th><th>OBA</th></tr>";

  groups.forEach(g=>{
    const prices = Object.values(g.prices);
    const min = Math.min(...prices);

    html+="<tr>";
    html+=`<td>${g.name}</td>`;

    ["Bravo","Neptun","OBA"].forEach(s=>{
      const p=g.prices[s];
      if(!p){
        html+="<td>-</td>";
      } else {
        html+=`<td class="${p===min?'best':''}">₼${p}</td>`;
      }
    });

    html+="</tr>";
  });

  html+="</table>";

  document.getElementById("table").innerHTML=html;
}
</script>

</body>
</html>
