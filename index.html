<!DOCTYPE html>
<html>
<body>

<h2>Qiymətlər</h2>
<div id="data"></div>

<script>
fetch("prices.json")
  .then(r => r.json())
  .then(data => {
    let html = "";

    for (let store in data) {
      html += `<p>${store}: ${data[store].price} AZN</p>`;
    }

    document.getElementById("data").innerHTML = html;
  });
</script>

</body>
</html>
