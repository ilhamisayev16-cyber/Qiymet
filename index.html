<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Qiym…ôtl…ôri - MΟΦqayis…ô</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-top: 30px; }
        .container { max-width: 960px; background: #ffffff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; font-weight: 700; }
        .update-time { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 25px; }
        .table th { background-color: #34495e; color: #ffffff; }
        .market-price { font-weight: 600; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-3">πü¦£ Market Qiym…ôtl…ôrinin MΟΦqayis…ôsi</h1>
        <div class="text-center update-time" id="last-updated">Yenil…ônir...</div>
        
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="text-center">
                    <tr>
                        <th>M…ôhsul</th>
                        <th>Brend</th>
                        <th>GΟΕst…ôrici / H…ôcm</th>
                        <th>Bravo</th>
                        <th>Araz</th>
                        <th>Oba</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadPrices() {
            try {
                // KeΟßidin qar≈üΡ±sΡ±nΡ± almaq ΟΦΟßΟΦn t…ôsadΟΦfi parametr …ôlav…ô edirik
                const response = await fetch('data/prices.json?t=' + new Date().getTime());
                const data = await response.json();
                
                document.getElementById('last-updated').textContent = "Son yenil…ônm…ô: " + (data.last_updated || 'M…ôlumat yoxdur');
                
                const tableBody = document.getElementById('table-body');
                tableBody.innerHTML = '';
                
                data.items.forEach(item => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td><strong>${item.category}</strong></td>
                        <td>${item.brand}</td>
                        <td class="text-muted">${item.details}</td>
                        <td class="text-center market-price">${item.Bravo ? item.Bravo + ' β²Φ' : '-'}</td>
                        <td class="text-center market-price">${item.Araz ? item.Araz + ' β²Φ' : '-'}</td>
                        <td class="text-center market-price">${item.Oba ? item.Oba + ' β²Φ' : '-'}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('X…ôta ba≈ü verdi:', error);
                document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="text-center text-danger">M…ôlumatlar yΟΦkl…ôn…ô bilm…ôdi.</td></tr>`;
            }
        }

        loadPrices();
    </script>
</body>
</html>
